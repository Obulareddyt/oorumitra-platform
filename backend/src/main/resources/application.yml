spring:
  application:
    name: ooru-mitra-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ooumitra}
    username: ${DB_USERNAME:ooumitra}
    password: ${DB_PASSWORD:ooumitra123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

  websocket:
    message-size-limit: 65536
    send-buffer-size-limit: 524288

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/plain
  error:
    include-message: always
    include-binding-errors: always

# JWT
jwt:
  secret: ${JWT_SECRET:OoruMitraSecretKey2026OoruMitraSecretKey2026OoruMitraSecretKey2026}
  expiration-ms: 604800000     # 7 days
  refresh-expiration-ms: 2592000000  # 30 days

# MSG91 (OTP)
msg91:
  auth-key: ${MSG91_AUTH_KEY:your-msg91-auth-key}
  template-id: ${MSG91_TEMPLATE_ID:your-otp-template-id}
  sender-id: OMITRA
  otp-expiry-minutes: 10
  base-url: https://api.msg91.com/api/v5

# Google Maps
google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:your-google-maps-api-key}

# AWS S3
aws:
  s3:
    access-key: ${AWS_ACCESS_KEY:your-access-key}
    secret-key: ${AWS_SECRET_KEY:your-secret-key}
    region: ${AWS_REGION:ap-south-1}
    bucket-name: ${AWS_BUCKET:ooumitra-media}
    cdn-url: ${AWS_CDN_URL:https://ooumitra-media.s3.ap-south-1.amazonaws.com}

# Firebase
firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:firebase-service-account.json}

# Pagination
app:
  pagination:
    default-page-size: 20
    max-page-size: 100
  search:
    default-radius-km: 50

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.ooumitra: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
