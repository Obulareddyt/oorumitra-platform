# ── Production profile ─────────────────────────────────────────────────────────
# Activated with SPRING_PROFILES_ACTIVE=prod (set in render.yaml).
# All secrets MUST come from environment variables — no defaults here.
spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

# Tighten health details in production (no DB/internal info to anonymous callers)
management:
  endpoint:
    health:
      show-details: never
      show-components: never

# Production CORS — restrict to the deployed web origin(s).
# Comma-separated; override via CORS_ALLOWED_ORIGINS env var.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://ooumitra-web.onrender.com}

logging:
  level:
    root: WARN
    com.ooumitra: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
