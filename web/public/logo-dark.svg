<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <!-- Logo Icon -->
  <g transform="translate(10, 10)">
    <!-- Outer Ring / Circle of Unity -->
    <circle cx="50" cy="50" r="45" fill="none" stroke="#10B981" stroke-width="5" stroke-dasharray="280" />
    <circle cx="50" cy="50" r="45" fill="none" stroke="#F59E0B" stroke-width="5" stroke-dasharray="140" stroke-dashoffset="140" />
    
    <!-- Location Pin -->
    <path d="M50,15 C33.43,15 20,28.43 20,45 C20,68.5 50,90 50,90 C50,90 80,68.5 80,45 C80,28.43 66.57,15 50,15 Z" fill="#3B82F6" opacity="0.9" />
    
    <!-- Green Leaf (Agriculture) -->
    <path d="M50,30 C45,38 45,52 50,55 C55,52 55,38 50,30 Z" fill="#10B981" />
    
    <!-- Village Houses Inside Pin -->
    <polygon points="35,60 45,50 55,60" fill="#FBBF24" />
    <rect x="38" y="60" width="14" height="10" fill="#D97706" />
    <polygon points="48,62 55,54 62,62" fill="#F59E0B" />
    <rect x="51" y="62" width="10" height="8" fill="#78350F" />
    
    <!-- Connectivity Nodes -->
    <circle cx="50" cy="30" r="3" fill="#FFFFFF" />
    <circle cx="35" cy="60" r="2.5" fill="#FFFFFF" />
    <circle cx="62" cy="62" r="2.5" fill="#FFFFFF" />
    <line x1="50" y1="30" x2="35" y2="60" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="2" />
    <line x1="50" y1="30" x2="62" y2="62" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="2" />
    <line x1="35" y1="60" x2="62" y2="62" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="2" />
  </g>
  
  <!-- Typography -->
  <text x="130" y="62" font-family="'Outfit', 'Inter', sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" letter-spacing="-1">
    Ooru<tspan fill="#60A5FA">Mitra</tspan>
  </text>
  <text x="132" y="85" font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="700" fill="#34D399" letter-spacing="3">
    DIGITAL VILLAGE
  </text>
</svg>
