services:
  # ── Backend (Docker) ─────────────────────────────────────────────────────────
  - type: web
    name: ooumitra-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      # Enable production profile (application-prod.yml)
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # Hostinger MariaDB — set secret values in the Render dashboard
      - key: DB_HOST
        value: in-mum-web679.main-hosting.eu
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: u185240877_oorumitra
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      # Production CORS — the deployed web origin (comma-separated for multiple)
      - key: CORS_ALLOWED_ORIGINS
        value: https://ooumitra-web.onrender.com

      # JWT — auto-generated secure secret
      - key: JWT_SECRET
        generateValue: true

      # MSG91 SMS
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_TEMPLATE_ID
        sync: false
      - key: MSG91_NOTIFICATION_TEMPLATE_ID
        sync: false
      - key: MSG91_SENDER_ID
        value: OORMIT

      # Google Maps (server-side geocoding)
      - key: GOOGLE_MAPS_API_KEY
        sync: false

      # AWS S3 (image uploads)
      - key: AWS_ACCESS_KEY
        sync: false
      - key: AWS_SECRET_KEY
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_BUCKET
        value: ooumitra-media
      - key: AWS_CDN_URL
        sync: false

  # ── Web Frontend (Static Site) ───────────────────────────────────────────────
  - type: web
    name: ooumitra-web
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Google Maps (browser key)
      - key: VITE_GOOGLE_MAPS_KEY
        sync: false
      # Set to https://ooumitra-backend.onrender.com/api after backend first deploys
      - key: VITE_API_URL
        sync: false
